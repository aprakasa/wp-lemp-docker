services:
  nginx:
    image: ghcr.io/aprakasa/nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./wordpress:/var/www/html:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - php_fpm_socket:/var/run/php-fpm
    depends_on:
      php-fpm:
        condition: service_healthy
    networks:
      - frontend
      - backend
    environment:
      - DOMAIN=${DOMAIN}
      - CACHE_MODE=${CACHE_MODE:-fastcgi-cache}
      - WP_MULTISITE=${WP_MULTISITE:-no}
      - SSL=${SSL:-0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    entrypoint: ["/entrypoint.sh"]

  php-fpm:
    image: ghcr.io/aprakasa/php-fpm:${PHP_VERSION:-8.5}
    container_name: php-fpm
    restart: unless-stopped
    volumes:
      - ./wordpress:/var/www/html
      - php_fpm_socket:/var/run/php-fpm
      - redis_socket:/var/run/redis
      - nginx_cache:/var/cache/nginx
      - ./php/entrypoint.sh:/entrypoint.sh:ro
      - ./php/healthcheck.sh:/healthcheck.sh:ro
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./php/zz-docker.conf:/usr/local/etc/php-fpm.d/zz-docker.conf:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    environment:
      - DOMAIN=${DOMAIN}
      - MARIADB_HOST=${MARIADB_HOST}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - REDIS_HOST=/var/run/redis/redis.sock
      - CACHE_MODE=${CACHE_MODE:-fastcgi-cache}
      - WP_MULTISITE=${WP_MULTISITE:-no}
      - WP_VERSION=${WP_VERSION:-latest}
      - WP_LOCALE=${WP_LOCALE:-en_US}
      - WORDPRESS_SITE_TITLE=${WORDPRESS_SITE_TITLE:-WordPress}
      - WORDPRESS_ADMIN_USER=${WORDPRESS_ADMIN_USER:-admin}
      - WORDPRESS_ADMIN_PASSWORD=${WORDPRESS_ADMIN_PASSWORD}
      - WORDPRESS_ADMIN_EMAIL=${WORDPRESS_ADMIN_EMAIL}
      - SSL=${SSL:-0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 60s

  mariadb:
    image: mariadb:12
    container_name: mariadb
    restart: unless-stopped
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - backend
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - redis_socket:/var/run/redis
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "su", "redis", "-s", "/bin/sh", "-c", "redis-cli -s /var/run/redis/redis.sock ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: []
    command: >
      sh -c "mkdir -p /var/run/redis && chown redis:redis /var/run/redis
      && exec su redis -s /bin/sh -c 'redis-server
      --bind \"\"
      --unixsocket /var/run/redis/redis.sock
      --unixsocketperm 777
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 100
      --appendonly yes'"

  wp-cron:
    image: ghcr.io/aprakasa/php-fpm:${PHP_VERSION:-8.5}
    container_name: wp-cron
    restart: unless-stopped
    volumes:
      - ./wordpress:/var/www/html
      - redis_socket:/var/run/redis
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    networks:
      - backend
    environment:
      - DOMAIN=${DOMAIN}
      - MARIADB_HOST=${MARIADB_HOST}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
    entrypoint: []
    command: >
      sh -c "echo '*/1 * * * * cd /var/www/html && wp cron event run --all --allow-root >> /var/log/wp-cron.log 2>&1' > /etc/crontabs/root
      && crond -f -l 2"

  acme-sh:
    image: neilpang/acme.sh
    container_name: acme-sh
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/webroot
      - ./acme-sh/entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - frontend
    environment:
      - DOMAIN=${DOMAIN}
      - SSL=${SSL:-0}
      - SSL_EMAIL=${SSL_EMAIL:-admin@${DOMAIN}}
      - SSL_STAGING=${SSL_STAGING:-0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 128M
    entrypoint: ["/entrypoint.sh"]

volumes:
  mariadb_data:
  redis_data:
  redis_socket:
  php_fpm_socket:
  nginx_cache:
  nginx_logs:
  ssl_certs:
  certbot_webroot:

networks:
  frontend:
  backend:
    internal: true
