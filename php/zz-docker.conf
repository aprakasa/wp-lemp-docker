[www]
user = www-data
group = www-data
listen = /var/run/php-fpm/php8.3-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 15
pm.max_requests = 1000
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
