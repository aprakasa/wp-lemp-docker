[global]
; Prevent PHP-FPM from forking to background - keeps it in foreground for proper container management
daemonize = no

; Log errors to stderr for Docker logging
error_log = /proc/self/fd/2

; Emergency restart threshold - restart if child processes crash too frequently
emergency_restart_threshold = 10
emergency_restart_interval = 1m

; Time to wait for child processes to respond to signals
process_control_timeout = 10s

[www]
user = 100
group = 101

; Unix socket configuration
listen = /var/run/php-fpm/php-fpm.sock
listen.owner = 100
listen.group = 101
listen.mode = 0666
listen.backlog = 65535

; Process management - dynamic scaling
pm = dynamic
pm.max_children = 4
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Restart workers after this many requests (increased for admin stability)
pm.max_requests = 5000

; Slow log for debugging slow requests (admin pages)
request_slowlog_timeout = 30s
slowlog = /var/log/php/slow.log

; Clear environment variables - security
; Set to 'no' to pass Docker env vars to PHP-FPM workers
clear_env = no

; Enable worker output capture for debugging
catch_workers_output = yes

; Don't decorate worker output (cleaner logs)
decorate_workers_output = no

; Limit files and memory for security
; These help prevent runaway processes on admin pages
; rlimit_files = 65535
; rlimit_core = 0

; Ping/Status endpoints for monitoring (optional)
; Uncomment if you want to enable status monitoring
; pm.status_path = /status
; ping.path = /ping
; ping.response = pong
