# WordPress permalinks
location / {
    try_files $uri $uri/ /index.php?$args;
}

# Multisite subdirectory rules
set $multisite_rewrite "";
if ($uri ~* ^/([_0-9a-zA-Z-]+/)(wp-(content|admin|includes).*)) {
    set $multisite_rewrite $2;
}
if ($uri ~* ^/([_0-9a-zA-Z-]+/)(.*\.php)$) {
    set $multisite_rewrite $2;
}

# PHP handling with multisite support
location ~ \.php$ {
    # If multisite subdirectory rewrite matched
    if ($multisite_rewrite) {
        rewrite ^/([_0-9a-zA-Z-]+/)(wp-(content|admin|includes).*) /$2 last;
        rewrite ^/([_0-9a-zA-Z-]+/)(.*\.php)$ /$2 last;
    }

    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass php;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}
