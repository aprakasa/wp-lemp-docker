set $skip_cache 0;

# Skip cache for logged in users and common cookies
if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|woocommerce_cart_hash|woocommerce_items_in_cart|wordpress_logged_in") {
    set $skip_cache 1;
}

# Skip POST requests
if ($request_method = POST) {
    set $skip_cache 1;
}

# Skip URLs with query strings
if ($query_string != "") {
    set $skip_cache 1;
}

# Skip WordPress admin and special pages
if ($uri ~* "/wp-admin/|/wp-login.php|/xmlrpc.php|/wp-(app|cron|login|register|mail).php|/feed/|wp-comments-popup.php|wp-links-opml.php|wp-locations.php|sitemap(_index)?.xml|[a-z0-9_-]+-sitemap([0-9]+)?.xml") {
    set $skip_cache 1;
}

# Skip WooCommerce non-cacheable pages
if ($uri ~* "/cart|/checkout|/my-account|/wc-api|/wc-auth|/addons|/wishlist|/order-tracking|/lost-password") {
    set $skip_cache 1;
}

# Skip WordPress REST API (WooCommerce, Jetpack, etc.)
if ($uri ~* "/wp-json/") {
    set $skip_cache 1;
}

fastcgi_cache_key "$scheme$request_method$host$request_uri";

location ~ /purge(/.*) {
    fastcgi_cache_purge WORDPRESS "$scheme$request_method$host$1";
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
}

location / {
    try_files $uri $uri/ /index.php?$args;
    add_header X-FastCGI-Cache $upstream_cache_status always;
    add_header X-Cache-Mode "fastcgi" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header X-Served-By "wp-lemp-docker" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), midi=(), notifications=(), push=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), vibrate=(), fullscreen=(self), payment=()" always;
}

location ~ \.php$ {
    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass php;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param HTTP_HOST $host;

    fastcgi_cache WORDPRESS;
    fastcgi_cache_bypass $skip_cache;
    fastcgi_no_cache $skip_cache;
    fastcgi_cache_valid 200 301 302 60m;
    fastcgi_cache_valid 404 1m;
    fastcgi_cache_use_stale error timeout updating invalid_header http_500 http_503;
    fastcgi_cache_min_uses 1;
    fastcgi_cache_methods GET HEAD;
    fastcgi_request_buffering off;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    fastcgi_read_timeout 300s;
    fastcgi_keep_conn on;
    add_header X-FastCGI-Cache $upstream_cache_status always;
    add_header X-Cache-Mode "fastcgi" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header X-Served-By "wp-lemp-docker" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), midi=(), notifications=(), push=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), vibrate=(), fullscreen=(self), payment=()" always;
}
