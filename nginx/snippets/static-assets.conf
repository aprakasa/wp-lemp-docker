# CSS/JS - 1 year cache
location ~* \.(css|js|json)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
    log_not_found off;
}

# Images - 1 year cache
location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|bmp|tiff|tif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
    log_not_found off;
}

# Fonts - 1 year cache
location ~* \.(woff|woff2|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
    log_not_found off;
}

# Media - 1 year cache
location ~* \.(mp4|webm|ogg|mp3|m4a|flac|wav)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
    log_not_found off;
}

# Documents - 30 days cache
location ~* \.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|gz|tar|rar|7z)$ {
    expires 30d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
    log_not_found off;
}

# Block PHP in uploads
location ~* /(?:uploads|files)/.*\.php$ {
    deny all;
}

# Block PHP in wp-includes (except tinymce)
location ~* /wp-includes/.*\.php$ {
    deny all;
}

location ~* /wp-includes/js/tinymce/wp-tinymce.php$ {
    try_files $uri =404;
    fastcgi_pass php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

# Disable autoindex in uploads
location ~* /wp-content/uploads/ {
    autoindex off;
}
