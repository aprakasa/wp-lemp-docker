# Documents - 30 days cache
location ~* \.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|gz|tar|rar|7z)$ {
    expires 30d;
    add_header Cache-Control "public" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Served-By "wp-lemp-docker" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), midi=(), notifications=(), push=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), vibrate=(), fullscreen=(self), payment=()" always;
    access_log off;
    log_not_found off;
}

# Block PHP in uploads
location ~* /(?:uploads|files)/.*\.php$ {
    deny all;
}

# Allow tinymce (specific BEFORE broad deny)
location ~* /wp-includes/js/tinymce/wp-tinymce\.php$ {
    try_files $uri =404;
    fastcgi_pass php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

# Block all other PHP in wp-includes
location ~* /wp-includes/.*\.php$ {
    deny all;
}

# Disable autoindex in uploads
location ~* /wp-content/uploads/ {
    autoindex off;
}
