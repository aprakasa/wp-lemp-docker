set $supercache_file "";
set $supercache_uri "";
set $supercache 1;

if ($request_method = POST) {
    set $supercache 0;
}

if ($query_string) {
    set $supercache 0;
}

if ($http_cookie ~* "comment_author_|wordpress_logged_in|wp-postpass_|woocommerce_cart_hash|woocommerce_items_in_cart") {
    set $supercache 0;
}

if ($supercache = 0) {
    set $supercache_uri "";
}

if ($supercache = 1) {
    set $supercache_file /wp-content/cache/supercache/${host}${uri};
}

location / {
    try_files $supercache_file $uri $uri/ /index.php?$args;
    add_header X-Cache-Mode "wp-super-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header X-Served-By "wp-lemp-docker" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), midi=(), notifications=(), push=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), vibrate=(), fullscreen=(self), payment=()" always;
}

location ~ \.php$ {
    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass php;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_intercept_errors on;
    fastcgi_request_buffering off;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    fastcgi_read_timeout 300s;
    fastcgi_keep_conn on;
    add_header X-Cache-Mode "wp-super-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header X-Served-By "wp-lemp-docker" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), midi=(), notifications=(), push=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), vibrate=(), fullscreen=(self), payment=()" always;
}
