# Block hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Block sensitive file extensions
location ~* \.(ini|log|sh|sql|bak|swp|orig|dist|po|pot|mo|tpl|twig|yml|yaml|conf)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Block wp-config access
location = /wp-config.php {
    deny all;
}

# XML-RPC - rate limited for Jetpack compatibility
location = /xmlrpc.php {
    limit_req zone=two burst=5 nodelay;
    limit_conn connlimit 5;
    try_files $uri =404;
    fastcgi_pass php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_read_timeout 300s;
    access_log off;
}

# Block direct wp-cron access (use system cron instead)
location = /wp-cron.php {
    deny all;
    access_log off;
    log_not_found off;
}

# Block malicious patterns
if ($uri ~* "base64_(en|de)code[^(]*\([^)]*\)") {
    return 403;
}

if ($uri ~* "eval\(") {
    return 403;
}

if ($args ~* "concat[^\(]*\(") {
    return 403;
}

if ($args ~* "union[^a-z]*select") {
    return 403;
}

if ($args ~* "[a-z0-9_]+=[a-z0-9_]+\(%") {
    return 403;
}

# Block thumbs.php
location = /thumbs.php {
    deny all;
    access_log off;
    log_not_found off;
}

# Client limits
client_body_buffer_size 128k;

# Rate limit login
location = /wp-login.php {
    limit_req zone=two burst=5 nodelay;
    limit_conn connlimit 5;
    try_files $uri =404;
    fastcgi_pass php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_intercept_errors on;
}

# Rate limit comments
location = /wp-comments-post.php {
    limit_req zone=one burst=10 nodelay;
    limit_conn connlimit 10;
    try_files $uri =404;
    fastcgi_pass php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

# Security headers
add_header X-Served-By "wp-lemp-docker" always;
add_header Content-Security-Policy "upgrade-insecure-requests" always;
