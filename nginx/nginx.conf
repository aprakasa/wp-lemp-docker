worker_processes auto;
worker_rlimit_nofile 100000;
pid /var/run/nginx.pid;

thread_pool default threads=32 max_queue=65536;

events {
    worker_connections 50000;
    use epoll;
    multi_accept on;
}

http {
    server_tokens off;
    server_name_in_redirect off;
    client_max_body_size 100m;
    connection_pool_size 256;
    request_pool_size 4k;
    reset_timedout_connection on;
    keepalive_timeout 30;
    keepalive_requests 100000;
    sendfile on;
    sendfile_max_chunk 512k;
    tcp_nopush on;
    tcp_nodelay on;
    client_body_timeout 30s;
    send_timeout 30s;
    lingering_close always;
    lingering_time 20s;
    lingering_timeout 5s;

    aio threads;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=two:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    fastcgi_cache_path /var/cache/nginx/fastcgi
        levels=1:2
        keys_zone=WORDPRESS:64m
        max_size=4g
        inactive=60m
        use_temp_path=off;
    fastcgi_cache_lock on;
    fastcgi_cache_lock_timeout 5s;

    include /etc/nginx/conf.d/upstream.conf;
    include /etc/nginx/snippets/gzip.conf;
    include /etc/nginx/snippets/brotli.conf;

    vhost_traffic_status_zone;

    map $uri $wphumancache {
        default 1;
        ~*\/wp-(admin|login|register|cron) 0;
        ~*\/xmlrpc 0;
        ~*\/wp-.*\.php 0;
        ~*\/feed\/? 0;
        ~*\/comment 0;
        ~*\/loggedin 0;
    }

    map $http_cookie $nocache {
        default 0;
        ~*wordpress_logged_in 1;
        ~*wp-postpass 1;
        ~*woocommerce_items_in_cart 1;
        ~*woocommerce_cart_hash 1;
        ~*edd_items_in_cart 1;
    }

    # Default server blocks
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;
        ssl_reject_handshake on;
    }

    include /etc/nginx/sites-enabled/*.conf;
}
